[build]
  # Deploy gate: a push that fails lint, typecheck, tests, or the RTP
  # reconciliation must not deploy. Netlify builds independently of GitHub CI
  # (no branch protection), so it runs the same gates itself — verify at 250k
  # spins/machine keeps the build fast; the 3.5σ gate still catches gross
  # breaks (CI's deeper 1M-spin run happens in parallel on GitHub).
  command = "pnpm lint && pnpm typecheck && pnpm test && pnpm verify -- --spins 250000 && pnpm generate"
  publish = "dist"

[build.environment]
  # Match .github/workflows/ci.yml so Netlify never builds on a different Node.
  NODE_VERSION = "22"
  # Install exactly the committed lockfile — never resolve fresh on deploy.
  PNPM_FLAGS = "--frozen-lockfile"

# No [[redirects]] block here: every route is prerendered (ssr: false +
# netlify_static), and the preset writes dist/_redirects with `/* /404.html 404`
# so unknown URLs are REAL 404s. A catch-all rewrite to index.html would only
# mislead — dist/_redirects takes precedence over rules defined in this file.

[[headers]]
  # Non-CSP security headers for all routes.
  # Content-Security-Policy is intentionally absent here — it is generated
  # per-build with sha256 hashes by scripts/csp-hashes.mjs and written into
  # dist/_headers (which Netlify processes before netlify.toml headers).
  # Do NOT add a CSP line here; it would conflict with the hash-pinned version.
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
