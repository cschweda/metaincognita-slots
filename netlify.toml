[build]
  command = "pnpm generate"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Non-CSP security headers for all routes.
  # Content-Security-Policy is intentionally absent here — it is generated
  # per-build with sha256 hashes by scripts/csp-hashes.mjs and written into
  # dist/_headers (which Netlify processes before netlify.toml headers).
  # Do NOT add a CSP line here; it would conflict with the hash-pinned version.
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
