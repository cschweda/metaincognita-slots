name: ci

on: push

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Engine purity — app/engine must not import UI frameworks
        run: |
          if grep -rnE "from ['\"](vue|pinia|#app|#imports|@nuxt|nuxt)" app/engine; then
            echo "app/engine imports a UI framework — the engine must stay pure" >&2
            exit 1
          fi

      - name: Verify floor (1M-spin smoke)
        run: pnpm run verify -- --spins 1000000

      - name: Build
        run: pnpm run build
